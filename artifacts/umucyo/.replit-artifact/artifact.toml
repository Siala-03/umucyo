kind = "web"
previewPath = "/"
title = "Umucyo Women Cooperative"
version = "1.0.0"
id = "artifacts/umucyo"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21095

[services.development]
run = "pnpm --filter @workspace/umucyo run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/umucyo", "run", "build" ]
publicDir = "artifacts/umucyo/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21095"
BASE_PATH = "/"
